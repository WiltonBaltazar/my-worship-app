services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: wora-app:latest
    container_name: wora-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: ${DB_CONNECTION:-sqlite}
      DB_DATABASE: ${DB_DATABASE:-/var/www/html/database/database.sqlite}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      AUTO_GENERATE_APP_KEY: ${AUTO_GENERATE_APP_KEY:-false}
    ports:
      - "8090:8081"
    volumes:
      - wora_storage:/var/www/html/storage
      - wora_database:/var/www/html/database
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8081/up || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 25s

volumes:
  wora_storage:
  wora_database:
